<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" rx="200" fill="#0B2147"/>

  <!-- Outer lens ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#0475ae" stroke-width="52"/>

  <!-- 6 aperture blades -->
  <g transform="translate(512,512)">
    <rect x="-48" y="-280" width="96" height="310" rx="48" fill="#0475ae" transform="rotate(0)"   opacity="1"/>
    <rect x="-48" y="-280" width="96" height="310" rx="48" fill="#0475ae" transform="rotate(60)"  opacity="0.9"/>
    <rect x="-48" y="-280" width="96" height="310" rx="48" fill="#0475ae" transform="rotate(120)" opacity="0.8"/>
    <rect x="-48" y="-280" width="96" height="310" rx="48" fill="#0475ae" transform="rotate(180)" opacity="0.9"/>
    <rect x="-48" y="-280" width="96" height="310" rx="48" fill="#0475ae" transform="rotate(240)" opacity="0.8"/>
    <rect x="-48" y="-280" width="96" height="310" rx="48" fill="#0475ae" transform="rotate(300)" opacity="0.9"/>
  </g>

  <!-- Center orange dot -->
  <circle cx="512" cy="512" r="92" fill="#ed6835"/>
  <!-- Lens center hole -->
  <circle cx="512" cy="512" r="52" fill="#0B2147"/>

  <!-- Lens reflection -->
  <circle cx="390" cy="390" r="36" fill="white" opacity="0.12"/>
</svg>
