<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Capital Studio — Logo Concepts</title>
  <style>
    body { background: #f4f4f5; font-family: system-ui, sans-serif; margin: 0; padding: 40px; }
    h1 { color: #0B2147; font-size: 18px; margin-bottom: 32px; }
    .grid { display: flex; gap: 32px; flex-wrap: wrap; }
    .card { background: white; border-radius: 16px; padding: 32px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card img { width: 200px; height: 200px; display: block; margin-bottom: 12px; }
    .card p { margin: 0; font-size: 13px; font-weight: 600; color: #0B2147; }
    .card span { font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <h1>Capital Studio — Logo Concepts</h1>
  <div class="grid">
    <div class="card">
      <img src="concept-clapperboard.svg">
      <p>1. Clapperboard</p>
      <span>Classic studio reference</span>
    </div>
    <div class="card">
      <img src="concept-lightning.svg">
      <p>2. Lightning Bolt</p>
      <span>Creative energy</span>
    </div>
    <div class="card">
      <img src="concept-aperture.svg">
      <p>3. Aperture / Lens</p>
      <span>Camera-inspired</span>
    </div>
    <div class="card">
      <img src="concept-crown.svg">
      <p>4. Crown + Play</p>
      <span>Capital meets Studio</span>
    </div>
    <div class="card">
      <img src="concept-bars.svg">
      <p>5. Rising Bars</p>
      <span>Bold & modern</span>
    </div>
  </div>
</body>
</html>
