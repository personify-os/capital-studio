[build]
builder = "NIXPACKS"

[deploy]
startCommand = "next start -p ${PORT:-3004}"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[cron.publish]
schedule = "* * * * *"
command = "curl -s -X POST https://studio.lhccapital.org/api/v1/cron/publish -H \"Authorization: Bearer $CRON_SECRET\""
